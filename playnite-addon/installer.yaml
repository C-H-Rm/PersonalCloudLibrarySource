AddonId: 'PersonalCloudLibrarySource_61993828-67a8-4468-93a2-293442e36328'
Packages:
  - Version: '0.1.1'
    RequiredApiVersion: '6.16.0'
    ReleaseDate: '2026-05-09'
    PackageUrl: https://github.com/KurtusCobain/PersonalCloudLibrarySource/releases/download/v0.1.1/PersonalCloudLibrarySource-0.1.1.pext
    Changelog:
      - Initial public alpha release.
      - Added LocalFile, LocalFolder, and RcloneRemote provider modes.
      - Added support for Google Drive, OneDrive, Dropbox, and similar providers through rclone.
      - Added support for local folders, external drives, mapped drives, synced folders, and NAS paths.
      - Added cloud-only library entries that can appear in Playnite before being downloaded.
      - Added manual Download to local cache support.
      - Added cached local launch support.
      - Added uninstall/remove cached copy support while keeping the Playnite catalog entry.
      - Added customizable library display name.
      - Added optional import diagnostics.
      - Added setup tools, sample manifests, documentation, and packaging scripts.
